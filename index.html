<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Woot Local SDK Test</title>
</head>
<body style="font-family:sans-serif; background:#111; color:#0f0; padding:20px;">
    <h3>Status: <span id="status" style="color: orange;">Iniciando...</span></h3>
    <pre id="output" style="background:#222; padding:10px; border:1px solid #444; height: 400px; overflow:auto; color: #61dafb;">
        Aguardando resposta do Chatwoot...
    </pre>

    <script>
        // --- SDK OFICIAL EMBUTIDO (Para ignorar bloqueios de CSP) ---
        (function() {
            var e = {
                on: function(e, t) { window.addEventListener("message", function(n) {
                    var o = n.data;
                    if (typeof o === "string") try { o = JSON.parse(o) } catch (e) {}
                    if (o.event === e) t(o.data)
                })},
                fetchContext: function() { window.parent.postMessage(JSON.stringify({ event: "appContext" }), "*") }
            };
            window.chatwoot = e;
            window.dispatchEvent(new CustomEvent("dashboard-app:ready"));
        })();
        // --- FIM DO SDK ---

        const statusEl = document.getElementById("status");
        const outputEl = document.getElementById("output");

        function initializeApp() {
            statusEl.innerText = "Conectado ✅";
            statusEl.style.color = "#0f0";

            const render = (data) => {
                console.log("Dados recebidos:", data);
                // Se o dado vier vazio, avisamos
                if (!data || Object.keys(data).length === 0) {
                    outputEl.textContent = "Conectado, mas o Chatwoot enviou um objeto vazio.";
                } else {
                    outputEl.textContent = JSON.stringify(data, null, 2);
                }
            };

            // Escuta os eventos do Chatwoot
            window.chatwoot.on("conversationChanged", render);
            window.chatwoot.on("appContext", render);

            // Pede os dados
            window.chatwoot.fetchContext();
        }

        // Inicia
        if (window.chatwoot) {
            initializeApp();
        }
    </script>
</body>
</html>
